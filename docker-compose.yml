services:
  postgres:
    image: postgres:17-alpine
    container_name: stayflow-db
    environment:
      POSTGRES_USER: stayflow
      POSTGRES_PASSWORD: stayflow_dev_password
      POSTGRES_DB: stayflow_track
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stayflow -d stayflow_track"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stayflow-backend
    env_file:
      - .env.development
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8081
    container_name: stayflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
      APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  migrate:
    image: migrate/migrate:latest
    container_name: stayflow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-stayflow}:${DB_PASSWORD:-stayflow_dev_password}@postgres:5432/${DB_NAME:-stayflow_track}?sslmode=disable",
      "up"
    ]

volumes:
  postgres_data:
